<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fashion Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-color: #050505;
            --text-color: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
            --card-bg: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.02) 100%);
            --card-hover-bg: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, rgba(255,255,255,0.05) 100%);
            --input-bg: rgba(20, 20, 20, 0.5);
            --input-focus-bg: rgba(30, 30, 30, 0.8);
            --category-bg: rgba(255, 255, 255, 0.05);
            --category-active: #ffffff;
            --category-text-active: #000000;
            --shadow-color: rgba(0,0,0,0.8);
            --glow-color: rgba(255, 255, 255, 0.15);
            --particle-color: 200, 200, 255;
            --font-main: 'Outfit', sans-serif;
            --card-size: 110px;
        }

        body.light-mode {
            --bg-color: #f0f2f5;
            --text-color: #111111;
            --text-muted: rgba(0, 0, 0, 0.6);
            --glass-border: rgba(0, 0, 0, 0.08);
            --card-bg: linear-gradient(135deg, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0.5) 100%);
            --card-hover-bg: linear-gradient(135deg, rgba(255,255,255,1) 0%, rgba(255,255,255,0.8) 100%);
            --input-bg: rgba(255, 255, 255, 0.7);
            --input-focus-bg: rgba(255, 255, 255, 1);
            --category-bg: rgba(0, 0, 0, 0.04);
            --category-active: #111111;
            --category-text-active: #ffffff;
            --shadow-color: rgba(163, 177, 198, 0.3);
            --glow-color: rgba(0, 0, 0, 0.1);
            --particle-color: 100, 120, 150;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100dvh;
            width: 100vw;
            overflow: hidden;
            user-select: none;
            transition: background-color 0.6s cubic-bezier(0.22, 1, 0.36, 1), color 0.6s ease;
        }

        #nebula-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .ui-layer {
            position: relative;
            z-index: 10;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: max(4vh, 30px);
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
        }

        .ui-layer::-webkit-scrollbar {
            width: 6px;
        }
        .ui-layer::-webkit-scrollbar-track {
            background: transparent;
        }
        .ui-layer::-webkit-scrollbar-thumb {
            background: var(--glass-border);
            border-radius: 10px;
        }

        .header {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            margin-bottom: 25px;
            z-index: 20;
            flex-shrink: 0;
            padding: 0 20px;
            margin-top: 40px;
        }

        .greeting {
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 700;
            letter-spacing: -1px;
            text-align: center;
            background: linear-gradient(to bottom right, var(--text-color), var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: floatDown 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            opacity: 0;
            transform: translateY(-20px);
        }

        @keyframes floatDown {
            to { opacity: 1; transform: translateY(0); }
        }

        .theme-switch-wrapper {
            position: absolute;
            top: 25px;
            right: 25px;
            z-index: 100;
        }

        .theme-switch {
            position: relative;
            display: inline-block;
            width: 76px;
            height: 38px;
        }

        .theme-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: var(--input-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            transition: .4s;
            border-radius: 38px;
            box-shadow: 0 8px 32px var(--shadow-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 10px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 30px;
            width: 30px;
            left: 3px;
            bottom: 3px;
            background-color: var(--text-color);
            transition: .4s cubic-bezier(0.34, 1.56, 0.64, 1);
            border-radius: 50%;
            z-index: 2;
        }

        input:checked + .slider:before {
            transform: translateX(40px);
        }

        .slider i {
            width: 16px;
            height: 16px;
            color: var(--text-color);
            z-index: 1;
            opacity: 0.8;
        }

        .clock-wrapper {
            position: absolute;
            top: 25px;
            left: 25px;
            z-index: 100;
        }

        .clock-container {
            font-family: var(--font-main);
            font-size: 1.05rem;
            font-weight: 500;
            color: var(--text-color);
            background: var(--input-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            padding: 10px 22px;
            border-radius: 30px;
            box-shadow: 0 8px 32px var(--shadow-color);
            display: flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.4s ease, color 0.6s ease;
            cursor: default;
        }
        
        .clock-container:hover {
            transform: scale(1.02);
        }

        .magnetic-wrap {
            display: inline-block;
            transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .search-container {
            position: relative;
            width: 100%;
            display: flex;
            justify-content: center;
            animation: fadeIn 1s ease 0.2s forwards;
            opacity: 0;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .search-input {
            width: 100%;
            max-width: 320px;
            padding: 16px 30px;
            border-radius: 40px;
            border: 1px solid var(--glass-border);
            background: var(--input-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            color: var(--text-color);
            font-family: var(--font-main);
            font-size: 1.05rem;
            outline: none;
            transition: all 0.5s cubic-bezier(0.22, 1, 0.36, 1);
            box-shadow: 0 10px 30px var(--shadow-color);
            text-align: center;
        }

        .search-input::placeholder {
            color: var(--text-muted);
            transition: opacity 0.3s;
        }

        .search-input:focus {
            max-width: 550px;
            background: var(--input-focus-bg);
            border-color: rgba(128, 128, 128, 0.4);
            box-shadow: 0 15px 40px var(--shadow-color);
        }
        .search-input:focus::placeholder {
            opacity: 0.5;
        }

        .category-nav-container {
            width: 100%;
            max-width: 800px;
            padding: 10px 20px;
            margin-bottom: 20px;
            z-index: 20;
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-shrink: 0;
            opacity: 0;
            animation: fadeIn 1s ease 0.4s forwards;
        }

        .nav-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 35px;
            border-radius: 30px;
            background: var(--category-bg);
            color: var(--text-muted);
            font-size: 1.05rem;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            overflow: hidden;
        }

        .nav-btn::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: translateX(-100%);
            transition: 0.5s;
        }

        .nav-btn:hover::after {
            transform: translateX(100%);
        }

        .nav-btn.active {
            background: var(--category-active);
            color: var(--category-text-active);
            box-shadow: 0 8px 25px var(--glow-color);
            border-color: transparent;
            font-weight: 600;
            transform: scale(1.05);
        }

        .app-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); 
            gap: 35px 25px; 
            width: 100%; 
            max-width: 1100px;
            padding: 20px 40px 120px 40px; 
            perspective: 1500px;
            flex-shrink: 0;
            justify-content: center; 
            align-content: start;
        }

        .app-card {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            cursor: pointer;
            border-radius: 28px;
            transform-style: preserve-3d;
            will-change: transform, opacity;
            opacity: 0;
            transform: translateY(30px) scale(0.9);
        }

        .card-glow {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: var(--card-size);
            height: var(--card-size);
            border-radius: 28px;
            background: var(--glow-color);
            filter: blur(20px);
            opacity: 0;
            transition: opacity 0.4s ease;
            z-index: 0;
            pointer-events: none;
        }

        .app-card:hover .card-glow {
            opacity: 1;
        }

        .icon-container {
            width: var(--card-size);
            height: var(--card-size);
            border-radius: 28px;
            position: relative;
            background: var(--card-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s, box-shadow 0.4s ease, border-color 0.4s ease;
            box-shadow: 0 15px 35px var(--shadow-color);
            z-index: 2;
            transform-style: preserve-3d;
        }

        .icon-container::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 28px;
            background: radial-gradient(
                200px circle at var(--mouse-x, 50%) var(--mouse-y, 50%),
                rgba(255, 255, 255, 0.2),
                transparent 40%
            );
            opacity: 0;
            transition: opacity 0.4s ease;
            z-index: 3;
            pointer-events: none;
        }

        .app-card:hover .icon-container::before {
            opacity: 1;
        }

        .app-card:hover .icon-container {
            background: var(--card-hover-bg);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 30px 60px var(--shadow-color), inset 0 0 0 1px rgba(255,255,255,0.1);
        }

        .app-icon {
            width: 65%;
            height: 65%;
            object-fit: contain; 
            border-radius: 14px;
            z-index: 4;
            filter: drop-shadow(0 8px 16px rgba(0,0,0,0.3));
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.4s ease;
            transform: translateZ(20px);
        }

        body.light-mode .app-icon {
            filter: drop-shadow(0 8px 16px rgba(0,0,0,0.15));
        }

        .app-card:hover .app-icon {
            transform: translateZ(50px) scale(1.15);
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.5));
        }

        .app-label-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            transform: translateZ(10px);
            transition: transform 0.3s ease;
        }

        .app-card:hover .app-label-container {
            transform: translateZ(30px) translateY(5px);
        }

        .app-label {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-color);
            text-transform: capitalize;
            letter-spacing: 0.5px;
            text-align: center;
            white-space: nowrap;
            text-shadow: 0 2px 10px var(--shadow-color);
        }

        .app-sublabel {
            font-size: 0.75rem;
            font-weight: 400;
            color: var(--text-muted);
            opacity: 0;
            height: 0;
            transition: all 0.3s ease;
            text-align: center;
            max-width: var(--card-size);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .app-card:hover .app-sublabel {
            opacity: 1;
            height: 15px;
        }

        .fallback {
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--text-color);
            text-align: center;
            width: 100%;
            display: none; 
            text-shadow: 0 4px 10px rgba(0,0,0,0.4);
            transform: translateZ(20px);
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            width: 92%;
            max-width: 1000px;
            height: 85vh;
            background: var(--input-bg);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 30px 80px rgba(0,0,0,0.8);
            transform: scale(0.95) translateY(20px);
            transition: all 0.5s cubic-bezier(0.22, 1, 0.36, 1);
            position: relative;
            overflow: hidden;
        }

        .modal-content::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
        }

        .modal-content.small-modal {
            max-width: 550px;
            height: auto;
            max-height: 85vh;
            padding: 35px;
        }

        .modal-overlay.active .modal-content {
            transform: scale(1) translateY(0);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--glass-border);
            flex-shrink: 0;
        }

        .modal-title-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .back-btn, .close-btn {
            background: var(--category-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-color);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .close-btn { font-size: 1.5rem; }

        .back-btn:hover, .close-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(1.1);
        }
        .close-btn:hover { transform: scale(1.1) rotate(90deg); }

        .modal-title {
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--text-color);
            letter-spacing: -0.5px;
        }

        .modal-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 30px 20px;
            overflow-y: auto;
            padding: 20px 10px 40px 10px;
            align-content: start;
        }
        
        .modal-grid::-webkit-scrollbar { display: none; }

        .category-list-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
        }

        .category-pill {
            padding: 14px 28px;
            border-radius: 30px;
            background: var(--category-bg);
            color: var(--text-color);
            font-size: 1.1rem;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid var(--glass-border);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            animation: fadeIn 0.4s ease forwards;
            opacity: 0;
            transform: translateY(10px);
        }

        .category-pill:hover {
            transform: translateY(-4px) scale(1.05);
            background: rgba(255,255,255,0.1);
            box-shadow: 0 10px 20px var(--shadow-color);
            border-color: rgba(255,255,255,0.3);
        }

        @keyframes popIn {
            0% { opacity: 0; transform: translateY(40px) scale(0.8); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes warpSpeed {
            0% { transform: scale(1) translateZ(0); filter: brightness(1); }
            20% { transform: scale(0.9) translateZ(-50px); filter: brightness(0.8); }
            100% { transform: scale(80) translateZ(500px); filter: brightness(2); opacity: 0; }
        }

        .clone-launching {
            animation: warpSpeed 0.7s cubic-bezier(0.7, 0, 0.84, 0) forwards;
            z-index: 10000 !important;
            pointer-events: none;
        }

        .launching-original .card-glow, 
        .launching-original .icon-container, 
        .launching-original .app-label-container {
            opacity: 0 !important;
            transition: opacity 0.2s;
        }

        .warp-overlay {
            position: fixed;
            inset: 0;
            background: var(--text-color); 
            opacity: 0;
            pointer-events: none;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }
        .warp-overlay.active { opacity: 1; }

        @media (max-width: 600px) {
            :root { --card-size: 95px; }
            .greeting { font-size: 2rem; }
            .app-grid {
                grid-template-columns: repeat(auto-fill, minmax(105px, 1fr));
                gap: 25px 15px;
                padding: 10px 20px 100px 20px;
            }
            .modal-content {
                width: 95%; height: 92vh; padding: 25px; border-radius: 30px;
            }
            .modal-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 20px 10px; }
            .theme-switch-wrapper { top: 15px; right: 15px; }
            .theme-switch { width: 66px; height: 34px; }
            .slider:before { width: 26px; height: 26px; }
            input:checked + .slider:before { transform: translateX(34px); }
            .clock-wrapper { top: 15px; left: 15px; }
            .clock-container { font-size: 0.85rem; padding: 8px 15px; gap: 5px; }
            .nav-btn { padding: 10px 25px; font-size: 0.95rem; }
        }
    </style>
</head>
<body>

    <canvas id="nebula-canvas"></canvas>
    <div class="warp-overlay" id="warpOverlay"></div>

    <div class="modal-overlay" id="appModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title-container">
                    <button class="back-btn magnetic-wrap" id="backToCategories">
                        <i data-lucide="arrow-left"></i>
                    </button>
                    <h2 class="modal-title" id="appModalTitle">Category</h2>
                </div>
                <button class="close-btn magnetic-wrap" id="closeAppModal"><i data-lucide="x"></i></button>
            </div>
            <div class="modal-grid" id="modalAppGrid"></div>
        </div>
    </div>

    <div class="modal-overlay" id="categorySelectionModal">
        <div class="modal-content small-modal">
            <div class="modal-header">
                <h2 class="modal-title">Explore Hubs</h2>
                <button class="close-btn magnetic-wrap" id="closeCategoryModal"><i data-lucide="x"></i></button>
            </div>
            <div class="category-list-grid" id="categoryListContainer"></div>
        </div>
    </div>

    <div class="ui-layer">
        <div class="magnetic-wrap clock-wrapper">
            <div class="clock-container">
                <i data-lucide="calendar-clock" style="width: 18px; height: 18px;"></i>
                <span id="digitalClockText"></span>
            </div>
        </div>

        <div class="magnetic-wrap theme-switch-wrapper">
            <label class="theme-switch">
                <input type="checkbox" id="themeCheckbox">
                <div class="slider">
                    <i data-lucide="moon"></i>
                    <i data-lucide="sun"></i>
                </div>
            </label>
        </div>

        <div class="header">
            <div class="greeting" id="greetingDisplay"></div>
            <div class="search-container">
                <input type="text" class="search-input" id="searchInput" placeholder="Search brands, styles, apps..." autocomplete="off">
            </div>
        </div>

        <div class="category-nav-container" id="mainCategoryNav">
            <div class="magnetic-wrap"><div class="nav-btn active" id="btnAll">All Brands</div></div>
            <div class="magnetic-wrap"><div class="nav-btn" id="btnCategories">Hubs</div></div>
        </div>

        <div class="app-grid" id="appGrid"></div>
    </div>

    <script>
        const apps = [
            { id: 1, name: "myntra", category: "Fashion, Hoodies, Sneakers, T-Shirts, Jeans", icon: "myntra", link: "https://www.myntra.com/", pinned: false },
            { id: 2, name: "snitch", category: "Sneakers, Hoodies, T-Shirts, Jeans", icon: "snitch", link: "https://www.snitch.com/", pinned: false },
            { id: 3, name: "shein", category: "Hoodies, T-Shirts, Jeans", icon: "shein", link: "https://www.sheinindia.in/", pinned: false },
            { id: 4, name: "powerlook", category: "T-Shirts, Jeans, Cargo Pants, Shirts", icon: "powerlook", link: "https://powerlook.in/", pinned: false },
            { id: 5, name: "bewakoof", category: "T-Shirts, Sneakers, Jackets, Winterwears, Jeans, Cargo Pants, Shirts", icon: "bewakoof", link: "https://www.bewakoof.com/", pinned: false },

        let isLightMode = false;

            lucide.createIcons();

        function initMagneticEffect() {
            const magnets = document.querySelectorAll('.magnetic-wrap');
            magnets.forEach(magnet => {
                const child = magnet.children[0];
                if(!child) return;
                
                magnet.addEventListener('mousemove', (e) => {
                    const rect = magnet.getBoundingClientRect();
                    const x = e.clientX - rect.left - rect.width / 2;
                    const y = e.clientY - rect.top - rect.height / 2;
                    child.style.transform = `translate(${x * 0.3}px, ${y * 0.3}px)`;
                });
                magnet.addEventListener('mouseleave', () => {
                    child.style.transform = `translate(0px, 0px)`;
                });
            });
        }

        const themeCheckbox = document.getElementById('themeCheckbox');
        if (themeCheckbox) {
            themeCheckbox.addEventListener('change', (e) => {
                isLightMode = e.target.checked;
                document.body.classList.toggle('light-mode', isLightMode);
            });
        }

        const updateDigitalClock = () => {
            const now = new Date();
            
            const isMobile = window.innerWidth <= 600;
            const dateOptions = { 
                weekday: isMobile ? 'short' : 'long', 
                year: 'numeric', 
                month: isMobile ? 'short' : 'long', 
                day: 'numeric' 
            };
            const dateString = now.toLocaleDateString('en-US', dateOptions);
            
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            const timeString = `${hours}:${minutes}:${seconds}`;
            
            const clockTextEl = document.getElementById('digitalClockText');
            if (clockTextEl) clockTextEl.textContent = `${dateString} • ${timeString}`;
        };
        setInterval(updateDigitalClock, 1000);
        updateDigitalClock();

        const appModalOverlay = document.getElementById('appModal');
        const appModalTitle = document.getElementById('appModalTitle');
        const modalAppGrid = document.getElementById('modalAppGrid');
        const categorySelectionModal = document.getElementById('categorySelectionModal');
        const categoryListContainer = document.getElementById('categoryListContainer');

        const btnAll = document.getElementById('btnAll');
        const btnCategories = document.getElementById('btnCategories');
        const mainGrid = document.getElementById('appGrid');

        const allCategories = new Set();
        apps.forEach(app => {
            if (app.category) {
                app.category.split(',').map(c => c.trim()).forEach(c => allCategories.add(c));
            }
        });

        function populateCategoryListModal() {
            categoryListContainer.innerHTML = '';
            const catsArray = Array.from(allCategories).sort();
            let delay = 0;
            
            catsArray.forEach(cat => {
                if (cat === 'All') return; 
                const pill = document.createElement('div');
                pill.className = 'category-pill';
                pill.textContent = cat;
                pill.style.animationDelay = `${delay}s`;
                
                pill.addEventListener('click', () => {
                    closeCategorySelectionModal();
                    setTimeout(() => openAppModal(cat), 300);
                });
                categoryListContainer.appendChild(pill);
                delay += 0.05;
            });
        }

        btnAll.addEventListener('click', () => {

            btnCategories.classList.remove('active');

            renderApps(mainGrid, '', 'All');
        });

        btnCategories.addEventListener('click', () => {
            openCategorySelectionModal();
        });

        function openCategorySelectionModal() {
            populateCategoryListModal();
            categorySelectionModal.classList.add('active');
        }

        function closeCategorySelectionModal() {
            categorySelectionModal.classList.remove('active');
        }

        function openAppModal(category) {
            appModalTitle.textContent = category;
            appModalOverlay.classList.add('active');
            renderApps(modalAppGrid, '', category);
        }

        function closeAppModal() {
            appModalOverlay.classList.remove('active');

        document.getElementById('closeAppModal').addEventListener('click', closeAppModal);
        document.getElementById('closeCategoryModal').addEventListener('click', closeCategorySelectionModal);
        document.getElementById('backToCategories').addEventListener('click', () => {

        window.addEventListener('click', (e) => {
            if (e.target === appModalOverlay) closeAppModal();
            if (e.target === categorySelectionModal) closeCategorySelectionModal();
        });
        
        window.handleImageError = function(img, baseName) {
            const extensions = ['png', 'jpg', 'jpeg', 'webp', 'gif', 'svg'];
            let currentExtIndex = parseInt(img.getAttribute('data-ext-index') || '0');
            
            currentExtIndex++;
            
            if (currentExtIndex < extensions.length) {
                img.setAttribute('data-ext-index', currentExtIndex);
                img.src = `images/${baseName}.${extensions[currentExtIndex]}`;
            } else {
                img.style.display = 'none';
                if (img.nextElementSibling && img.nextElementSibling.classList.contains('fallback')) {
                    img.nextElementSibling.style.display = 'block';
                }
            }
        };

        function renderApps(targetGrid, filterText = '', categoryFilter = 'All') {
            if (!targetGrid) return;
            targetGrid.innerHTML = '';
            let delay = 0;

            const filteredApps = apps.filter(app => {
                const name = app.name || '';
                const category = app.category || '';
                const matchesSearch = name.toLowerCase().includes(filterText.toLowerCase()) || category.toLowerCase().includes(filterText.toLowerCase());
                const categoryList = category ? category.split(',').map(c=>c.trim()) : [];
                const matchesCategory = categoryFilter === 'All' || categoryList.includes(categoryFilter);
                return matchesSearch && matchesCategory;
            });
            
            filteredApps.forEach((app, index) => {
                const card = document.createElement('div');
                card.className = 'app-card';
                card.style.animation = `popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards ${delay}s`;
                
                const appName = app.name;
                const topCategory = app.category.split(',')[0].trim();
                
                const imgContent = `<img src="images/${app.icon}.png" data-ext-index="0" class="app-icon" onerror="handleImageError(this, '${app.icon}')" alt="${appName} logo">
                                    <div class="fallback">${appName.substring(0,2).toUpperCase()}</div>`;

                card.innerHTML = `
                    <div class="card-glow"></div>
                    <div class="icon-container">
                        ${imgContent}
                    </div>
                    <div class="app-label-container">
                        <span class="app-label">${appName}</span>
                        <span class="app-sublabel">${topCategory}</span>
                    </div>
                `;

                const container = card.querySelector('.icon-container');
                let bounds;
                
                card.addEventListener('mouseenter', () => {
                    bounds = container.getBoundingClientRect();
                    card.style.zIndex = 10;
                    container.style.transition = 'none';
                });
                
                card.addEventListener('mouseleave', () => {
                    card.style.zIndex = 1;
                    container.style.transition = 'transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1), box-shadow 0.5s ease';
                    container.style.transform = `perspective(1000px) rotateX(0) rotateY(0) scale(1)`;
                    container.style.setProperty('--mouse-x', `50%`);
                    container.style.setProperty('--mouse-y', `50%`);
                });

                card.addEventListener('mousemove', (e) => {
                    if(!bounds) bounds = container.getBoundingClientRect();
                    const mouseX = e.clientX - bounds.left;
                    const mouseY = e.clientY - bounds.top;
                    
                    container.style.setProperty('--mouse-x', `${mouseX}px`);
                    container.style.setProperty('--mouse-y', `${mouseY}px`);

                    const centerX = bounds.width / 2;
                    const centerY = bounds.height / 2;
                    const rotateX = ((mouseY - centerY) / centerY) * -15;
                    const rotateY = ((mouseX - centerX) / centerX) * 15;

                    container.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.05)`;
                });
                
                card.addEventListener('click', (e) => {
                    e.preventDefault();
                    
                    container.style.transition = 'none';
                    container.style.transform = 'none';
                    const rect = container.getBoundingClientRect();
                    
                    const clone = container.cloneNode(true);
                    clone.style.position = 'fixed';
                    clone.style.top = `${rect.top}px`;
                    clone.style.left = `${rect.left}px`;
                    clone.style.width = `${rect.width}px`;
                    clone.style.height = `${rect.height}px`;
                    clone.style.margin = '0';
                    clone.classList.add('clone-launching');
                    
                    document.body.appendChild(clone);
                    card.classList.add('launching-original');
                    
                    const overlay = document.getElementById('warpOverlay');
                    if(overlay) overlay.classList.add('active');

                    setTimeout(() => {
                        if (app.link) window.open(app.link, '_blank');
                        setTimeout(() => {
                            card.classList.remove('launching-original');
                            if(overlay) overlay.classList.remove('active');
                            clone.remove();
                        }, 500);
                    }, 600);
                });

                targetGrid.appendChild(card);
                delay += 0.04;
            });
        }

        const searchInput = document.getElementById('searchInput');
        if (searchInput) {
            searchInput.addEventListener('input', (e) => {
                btnAll.classList.add('active');
                btnCategories.classList.remove('active');
                renderApps(mainGrid, e.target.value, 'All');
            });
        }

        const updateGreeting = () => {
            const now = new Date();
            const hour = now.getHours();
            let timeGreeting = "Good Morning";
            if (hour >= 12 && hour < 17) timeGreeting = "Good Afternoon";
            else if (hour >= 17) timeGreeting = "Good Evening";
            
            const greetingEl = document.getElementById('greetingDisplay');
            if (greetingEl) greetingEl.textContent = `${timeGreeting}`;
        };
        setInterval(updateGreeting, 60000);
        updateGreeting();

        const canvas = document.getElementById('nebula-canvas');
        if (canvas) {
            const ctx = canvas.getContext('2d');
            let width, height, particles = [];
            let mouse = { x: -1000, y: -1000, vx: 0, vy: 0 };
            let lastMouse = { x: -1000, y: -1000 };

            function resize() {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            window.addEventListener('mousemove', (e) => {
                lastMouse.x = mouse.x;
                lastMouse.y = mouse.y;
                mouse.x = e.clientX;
                mouse.y = e.clientY;
                mouse.vx = mouse.x - lastMouse.x;
                mouse.vy = mouse.y - lastMouse.y;
            });

            class Particle {
                constructor() {
                    this.x = Math.random() * width;
                    this.y = Math.random() * height;
                    this.baseVx = (Math.random() - 0.5) * 0.3;
                    this.baseVy = (Math.random() - 0.5) * 0.3;
                    this.vx = this.baseVx;
                    this.vy = this.baseVy;
                    this.size = Math.random() * 2 + 0.5;
                    this.baseOpacity = Math.random() * 0.5 + 0.1;
                }

                update() {
                    const dx = mouse.x - this.x;
                    const dy = mouse.y - this.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const interactionRadius = 150;

                    if (dist < interactionRadius) {
                        const force = (interactionRadius - dist) / interactionRadius;
                        this.x -= (dx / dist) * force * 2;
                        this.y -= (dy / dist) * force * 2;
                        this.vx += mouse.vx * force * 0.02;
                        this.vy += mouse.vy * force * 0.02;
                    }

                    this.vx += (this.baseVx - this.vx) * 0.05;
                    this.vy += (this.baseVy - this.vy) * 0.05;

                    this.x += this.vx;
                    this.y += this.vy;

                    if (this.x < 0) this.x = width;
                    if (this.x > width) this.x = 0;
                    if (this.y < 0) this.y = height;
                    if (this.y > height) this.y = 0;
                }

                draw() {
                    const computedStyle = getComputedStyle(document.body);
                    const rgb = computedStyle.getPropertyValue('--particle-color').trim();
                    ctx.fillStyle = `rgba(${rgb}, ${this.baseOpacity})`;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            function initParticles() {
                particles = [];
                const particleCount = window.innerWidth < 600 ? 60 : 120;
                for (let i = 0; i < particleCount; i++) particles.push(new Particle());
            }

            function animate() {
                ctx.clearRect(0, 0, width, height);
                const computedStyle = getComputedStyle(document.body);
                const rgb = computedStyle.getPropertyValue('--particle-color').trim();

                for (let i = 0; i < particles.length; i++) {
                    let p = particles[i];
                    p.update();
                    p.draw();

                    for (let j = i + 1; j < particles.length; j++) {
                        let p2 = particles[j];
                        let dx = p.x - p2.x;
                        let dy = p.y - p2.y;
                        let distSq = dx*dx + dy*dy;

                        if (distSq < 10000) {
                            const dist = Math.sqrt(distSq);
                            const alpha = (1 - dist / 100) * 0.15;
                            ctx.strokeStyle = `rgba(${rgb}, ${alpha})`;
                            ctx.lineWidth = 0.8;
                            ctx.beginPath();
                            ctx.moveTo(p.x, p.y);
                            ctx.lineTo(p2.x, p2.y);
                            ctx.stroke();
                        }
                    }
                }
                
                mouse.vx *= 0.8;
                mouse.vy *= 0.8;
                
                requestAnimationFrame(animate);
            }

            initParticles();
            animate();
        }

        initMagneticEffect();
        renderApps(mainGrid, '', 'All');
        
    </script>
